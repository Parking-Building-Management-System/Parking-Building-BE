app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001,http://localhost:5173,https://www.hmnm.id.vn,https://hmnm.id.vn}}
  swagger:
    server:
      url: ${SWAGGER_SERVER_URL:https://hmnm.id.vn}
      description: ${SWAGGER_SERVER_DESC:Prod Server}
  storage:
    minio:
      endpoint: ${APP_MINIO_ENDPOINT:}
      access-key: ${APP_MINIO_ACCESS_KEY:}
      secret-key: ${APP_MINIO_SECRET_KEY:}
      signing-region: ${APP_MINIO_SIGNING_REGION:minio}
      bucket: ${APP_MINIO_BUCKET:smartpark}
  payos:
    enabled: ${PAYOS_ENABLED:false}
    client-id: ${PAYOS_CLIENT_ID:}
    api-key: ${PAYOS_API_KEY:}
    checksum-key: ${PAYOS_CHECKSUM_KEY:}
    webhook-url: ${PAYOS_WEBHOOK_URL:}
    return-url: ${PAYOS_RETURN_URL:}
    cancel-url: ${PAYOS_CANCEL_URL:}
  demo-seed:
    enabled: ${APP_DEMO_SEED_ENABLED:false}
    floor-maps-enabled: ${APP_DEMO_SEED_FLOOR_MAPS_ENABLED:false}
    slot-coordinates-enabled: ${APP_DEMO_SEED_SLOT_COORDINATES_ENABLED:false}

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  application:
    name: smartpark

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    out-of-order: true

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST}
      port: ${SPRING_DATA_REDIS_PORT}
      timeout: ${SPRING_DATA_REDIS_TIMEOUT}

jwt:
  signer-key-base64: ${JWT_SIGNER_KEY_BASE64}
  valid-duration: ${JWT_VALID_DURATION}
  refreshable-duration: ${JWT_REFRESHABLE_DURATION}

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    root: INFO
    com.smartpark.swp391: DEBUG
